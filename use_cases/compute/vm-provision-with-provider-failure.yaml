uuid: uc-seed-006a
handle: compute/vm-provision-with-provider-failure
scenario:
  description: An application team submits a VM provisioning request. The policy
    checks pass and the service provider accepts the dispatch, but partway through
    realization the provider becomes unreachable. The recovery policy must classify
    the partial-realization state, decide whether to requeue against another eligible
    provider, hold the request pending provider recovery, or fail the request and
    release any partially-allocated resources. The tenant must not be left with
    orphaned partially-provisioned state.
  actor:
    persona: application-team-member
    profile: standard
  intent: Provision a VM under conditions where the primary service provider fails
    mid-realization
  success_criteria:
  - Provider unreachability is detected within the dispatch timeout, not indefinitely
    pending
  - Partially-allocated resources are either reconciled to a completed state or cleanly
    released
  - Recovery policy decision is explicit and audit-recorded (requeue / hold / fail)
  - If another eligible provider exists and policy permits, the request is requeued
    automatically
  - The tenant's requested state never shows a resource in an indeterminate state
    without a matching recovery record
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: recovery_policy
    provider_landscape: multiple_eligible
    governance_context: standard_governance
    failure_mode: provider_failure
  profile: standard
  expected_domain_interactions:
  - domain: provider
    interaction: service provider accepts dispatch then becomes unreachable mid-realization
  - domain: policy
    interaction: recovery policy classifies partial-realization state and selects
      action
  - domain: provider
    interaction: if policy selects requeue, alternate eligible provider is dispatched
  - domain: data
    interaction: partial-realization state tracked, reconciled or released per recovery
      decision
  - domain: audit
    interaction: failure detection, recovery decision, and final outcome recorded
      with provider identities
